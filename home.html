<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind daisyUI link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

     <!-- icon font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- link css -->
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-100 min-h-screen">
                    <!-- navbar -->
    <header class="bg-white">
           <div class="max-w-7xl mx-auto px-4 py-4">

             <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

                <!-- Logo -->
                <h1 class="font-semibold text-2xl text-[#1F2937] flex items-center gap-2">
                    <img src="./assets/github-logo.png" class="w-6">
                    GitHub Issues Tracker
                </h1>

                <!-- Search-->
                <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                
                    <input
                    id="searchInput" type="text" placeholder="Search issues..." class="border border-gray-400 px-3 py-2 rounded-md w-full"
                    />

                    <button class="bg-blue-700 hover:bg-blue-600 font-semibold text-white px-4 py-2 rounded-md whitespace-nowrap">
                    <i class="fa-solid fa-plus"></i> New Issue
                    </button>

                </div>

             </div>

            </div>
    </header>

                      <!-- Tabs section -->
    <section class="w-10/12 mx-auto mt-14">
        
            <div class="bg-white border border-gray-200 rounded-sm p-3 shadow-sm">
                <div class="flex gap-3">

                        <button id="tabAll"
                        class="px-6 py-2 font-medium text-white bg-purple-600 rounded-md">
                        All
                        </button>

                        <button id="tabOpen"
                        class="px-6 py-2 font-medium text-[#64748B] border border-gray-200 rounded-md">
                        Open
                        </button>

                        <button id="tabClosed"
                        class="px-6 py-2 font-medium text-[#64748B] border border-gray-200 rounded-md">
                        Closed
                        </button>

                    </div>
            </div>

    </section>

                <!-- Issues Section -->
    <section class="w-10/12 mx-auto mt-6">
                 <!-- Top Bar -->
        <div class="bg-white border border-gray-200 rounded-lg p-6 flex justify-between items-center mb-6">
            
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-purple-100 rounded-full flex justify-center items-center">
                    <img src="./assets/Aperture.png" alt="">
                </div>
               <div>
                 <h2 class="text-lg font-semibold text-[#1F2937]">
                    <span id="totalIssues">50</span> Issues
                </h2>
                <p class="text-sm text-gray-500">
                    Track and manage your project issues
                </p>
               </div>
            </div>

            <div class="flex gap-6 text-sm">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                    Open
                </div>

                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                    Closed
                </div>
            </div>
        </div>


              <!-- Loading Spinner -->

        <div id="loadingSpinner" class="text-center py-10 text-gray-800 hidden">
            <span class="loading loading-spinner loading-lg"></span>
        </div>

                    <!-- Cards Container -->
        <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

        </div>

    </section>
                <!-- modal -->
    <dialog id="issueModal" class="modal">

  <div class="modal-box max-w-xl p-6">

                <!-- Title -->
    <h3 id="modalTitle" class="text-2xl font-semibold text-gray-800 mb-3"></h3>

              <!--modal Status Row -->
    <div class="flex items-center gap-3 text-sm mb-4">

      <span id="modalStatus"
      class="px-3 py-1 rounded-full text-white bg-green-500 text-xs"></span>

      <span class="text-gray-400">•</span>

      <span id="modalAuthor" class="text-gray-600"></span>

      <span class="text-gray-400">•</span>

      <span id="modalDate" class="text-gray-600"></span>

    </div>

             <!-- Labels on Modal -->
    <div id="modalLabels" class="flex gap-2 mb-4"></div>

             <!--MOdal Description -->
    <p id="modalDescription" class="text-gray-600 mb-6"></p>

           <!-- Info Box -->
    <div class="bg-gray-100 rounded-lg p-4 flex justify-start gap-50 items-center mb-6">

        <div>
            <p class="text-sm text-gray-500">Assignee:</p>
            <p id="modalAssignee" class="font-semibold text-gray-700"></p>
        </div>

        <div>
            <p class="text-sm text-gray-500">Priority:</p>
            <span id="modalPriority"
            class="px-3 py-1 rounded-full text-xs text-white bg-red-500"></span>
        </div>

    </div>

    <!-- Close Button -->
    <div class="flex justify-end">
        <form method="dialog">
            <button class="bg-blue-700  text-white px-5 py-2 rounded-md hover:bg-blue-600">
                Close
            </button>
        </form>
    </div>

  </div>

</dialog>

    <script src="./js/home.js"></script>
</body>
</html>
