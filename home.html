<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind daisyUI link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

     <!-- icon font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- link css -->
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-100 min-h-screen">
                    <!-- navbar -->
    <header class="bg-white">
           <div class="max-w-7xl mx-auto px-4 py-4">

             <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

                <!-- Logo -->
                <h1 class="font-semibold text-2xl text-[#1F2937] flex items-center gap-2">
                    <img src="./assets/github-logo.png" class="w-6">
                    GitHub Issues Tracker
                </h1>

                <!-- Search-->
                <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                
                    <input
                    id="searchInput" type="text" placeholder="Search issues..." class="border border-gray-400 px-3 py-2 rounded-md w-full"
                    />

                    <button class="bg-blue-700 font-semibold text-white px-4 py-2 rounded-md whitespace-nowrap">
                    <i class="fa-solid fa-plus"></i> New Issue
                    </button>

                </div>

             </div>

            </div>
    </header>



</body>
</html>
