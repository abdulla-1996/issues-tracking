<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind daisyUI link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

     <!-- icon font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- link css -->
    <link rel="stylesheet" href="/style.css">
</head>

<body class="bg-base-200 py-[50px]">
                        <!-- Login Section -->
      <section class="min-h-screen bg-white max-w-md mx-auto rounded-sm shadow-[0_3px_10px_-2px_#00000026]">
                        <!-- logo -->
        <div class="text-center">
            <img class="mx-auto py-5" src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-xl">GitHub Issues Tracker</h2>
            <p class="text-[#64748B] text-[14px]">Sign in to manage your issues</p>
        </div>

                    <!-- login form -->
            <div class="card-body mx-auto">
                <fieldset class="fieldset">

                <label class="label text-[#1F2937] font-bold">User Name</label>

                <input id="input-name" type="text" class="input w-full rounded-xs" value="" placeholder="Enter User Name"/>
                <br>

                <label class="label text-[#1F2937] font-bold">Password</label>

                <input id="input-pin" type="password" class="input w-full rounded-xs"   placeholder="password" />
                
                <button id="login-btn" class="btn bg-primary mt-4 rounded-xs text-white">Sign In</button>
                </fieldset>
            </div>
                        <!-- underline -->
            <div class="flex items-center gap-4 mb-4 px-8">
                <div class="flex-1 border-t border-[#E4E4E7]"></div>
                <span class="text-gray-500 text-sm font-medium">OR</span>
                <div class="flex-1 border-t border-[#E4E4E7]"></div>
            </div>

            <div class="text-center space-y-3 bg-gray-100 py-3 mx-[26px] rounded-sm">
                <p class="text-[#64748B] text-[14px]">Demo Credentials:</p>
                <div>
                    <p class="font-semibold">Username: <span class="text-[#64748B]  text-[14px]">admin</span></p>
                    <p class="font-semibold">Password: <span class="text-[#64748B]  text-[14px]">admin123</span></p>
                </div>
            </div>
               
    </section>
     

    <script src="./js/login.js"></script>
</body>
</html>
